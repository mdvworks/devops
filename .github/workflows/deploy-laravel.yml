name: Reusable Deploy Laravel

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Nama app'
        required: true
        type: string
      image_name:
        description: 'Nama image Docker tanpa username'
        required: true
        type: string
      host:
        description: 'Domain host untuk ingress'
        required: true
        type: string
      php_version:
        description: 'Versi PHP'
        required: false
        type: string
        default: '8.3'
      node_version:
        description: 'Versi Node.js'
        required: false
        type: string
        default: '22'
      use_pnpm:
        description: 'Pakai pnpm?'
        required: false
        type: boolean
        default: true
      replicas:
        description: 'Jumlah replicas kubernetes'
        required: false
        type: number
        default: 1
      container_port:
        description: 'Port container'
        required: false
        type: number
        default: 80
    secrets:
      TS_AUTHKEY:
        required: true
      SSH_PRIVATE_KEY:
        required: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — LOAD SECRETS
  # ─────────────────────────────────────────
  load_secrets:
    name: Load Secrets dari Server
    runs-on: ubuntu-latest

    outputs:
      docker_username: ${{ steps.secrets.outputs.docker_username }}
      docker_password: ${{ steps.secrets.outputs.docker_password }}
      kube_config: ${{ steps.secrets.outputs.kube_config }}
      env_repo_token: ${{ steps.secrets.outputs.env_repo_token }}
      scc_api_key: ${{ steps.secrets.outputs.scc_api_key }}   
      scc_url: ${{ steps.secrets.outputs.scc_url }} 

    steps:
    - name: Setup Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TS_AUTHKEY }}

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        cat <<'SSHKEY' > ~/.ssh/id_ed25519
        ${{ secrets.SSH_PRIVATE_KEY }}
        SSHKEY
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H 100.96.143.63 >> ~/.ssh/known_hosts

    - name: Ambil secrets dari server
      id: secrets
      run: |
        SECRETS=$(ssh -i ~/.ssh/id_ed25519 michael@100.96.143.63 "cat /etc/devops/secrets.env")

        DOCKER_USERNAME=$(echo "$SECRETS" | grep ^DOCKER_USERNAME | cut -d '=' -f2-)
        DOCKER_PASSWORD=$(echo "$SECRETS" | grep ^DOCKER_PASSWORD | cut -d '=' -f2-)
        KUBE_CONFIG=$(echo "$SECRETS" | grep ^KUBE_CONFIG | cut -d '=' -f2-)
        ENV_REPO_TOKEN=$(echo "$SECRETS" | grep ^ENV_REPO_TOKEN | cut -d '=' -f2-)
        SCC_API_KEY=$(echo "$SECRETS" | grep ^SCC_API_KEY | cut -d '=' -f2-)
        SCC_URL=$(echo "$SECRETS" | grep ^SCC_URL | cut -d '=' -f2-)

        echo "=== Debug lengths ==="
        echo "DOCKER_USERNAME length: ${#DOCKER_USERNAME}"
        echo "DOCKER_PASSWORD length: ${#DOCKER_PASSWORD}"
        echo "KUBE_CONFIG length: ${#KUBE_CONFIG}"
        echo "ENV_REPO_TOKEN length: ${#ENV_REPO_TOKEN}"

        echo "docker_username=$DOCKER_USERNAME" >> $GITHUB_OUTPUT
        echo "docker_password=$DOCKER_PASSWORD" >> $GITHUB_OUTPUT
        echo "kube_config=$KUBE_CONFIG" >> $GITHUB_OUTPUT
        echo "env_repo_token=$(echo -n "$ENV_REPO_TOKEN" | base64 -w 0)" >> $GITHUB_OUTPUT
        echo "scc_api_key=$(echo -n "$SCC_API_KEY" | base64 -w 0)" >> $GITHUB_OUTPUT
        echo "scc_url=$(echo -n "$SCC_URL" | base64 -w 0)" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────
  # JOB 2 — BUILD
  # ─────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [load_secrets]
    env:
      ENV_REPO_TOKEN: ${{ needs.load_secrets.outputs.env_repo_token }}
      DOCKER_USERNAME: ${{ needs.load_secrets.outputs.docker_username }}
      DOCKER_PASSWORD: ${{ needs.load_secrets.outputs.docker_password }}

    steps:
    - name: Debug job outputs
      run: |
        echo "ENV_REPO_TOKEN length: ${#ENV_REPO_TOKEN}"
        echo "DOCKER_USERNAME length: ${#DOCKER_USERNAME}"
        echo "DOCKER_PASSWORD length: ${#DOCKER_PASSWORD}"

    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php_version }}
        extensions: mbstring, xml, ctype, iconv, json, dom, curl

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Setup Node.js
      if: inputs.node_version != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Install pnpm & build frontend
      if: inputs.node_version != '' && inputs.use_pnpm == true
      run: |
        npm install -g pnpm
        pnpm install
        pnpm run build

    - name: Install npm & build frontend
      if: inputs.node_version != '' && inputs.use_pnpm == false
      run: |
        npm ci
        npm run build
    - name: Decode token
      run: |
        echo "ENV_REPO_TOKEN=$(echo '${{ needs.load_secrets.outputs.env_repo_token }}' | base64 --decode)" >> $GITHUB_ENV
    - name: Checkout devops repo
      uses: actions/checkout@v4
      with:
        repository: mdvworks/devops
        token: ${{ env.ENV_REPO_TOKEN }}
        path: devops-repo

    - name: Copy docker config dari devops repo
      run: |
        mkdir -p docker
        cp devops-repo/docker/laravel/nginx.conf docker/nginx.conf
        cp devops-repo/docker/laravel/supervisord.conf docker/supervisord.conf
        cp devops-repo/docker/laravel/entrypoint.sh docker/entrypoint.sh

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ needs.load_secrets.outputs.docker_username }}
        password: ${{ needs.load_secrets.outputs.docker_password }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ needs.load_secrets.outputs.docker_username }}/${{ inputs.image_name }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 3 — SECURITY SCAN
  # ─────────────────────────────────────────
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [load_secrets, build]

    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php_version }}
        extensions: mbstring, xml, ctype, iconv, json, dom, curl

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Composer audit
      run: composer audit --no-dev || true

    - name: Trivy scan Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ needs.load_secrets.outputs.docker_username }}/${{ inputs.image_name }}:latest
        format: table
        exit-code: '1'
        severity: CRITICAL
        ignore-unfixed: true
        vuln-type: library

  # ─────────────────────────────────────────
  # JOB 4 — DEPLOY
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [load_secrets, scan]
    env:
      ENV_REPO_TOKEN: ${{ needs.load_secrets.outputs.env_repo_token }}
      DOCKER_USERNAME: ${{ needs.load_secrets.outputs.docker_username }}
      KUBE_CONFIG: ${{ needs.load_secrets.outputs.kube_config }}

    steps:
    - name: Setup Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TS_AUTHKEY }}

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H 100.96.143.63 >> ~/.ssh/known_hosts

    - name: Set up Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ needs.load_secrets.outputs.kube_config }}" | base64 --decode > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Verify kubectl connection
      run: kubectl get nodes

    - name: Decode token
      run: |
        echo "ENV_REPO_TOKEN=$(echo '${{ needs.load_secrets.outputs.env_repo_token }}' | base64 --decode)" >> $GITHUB_ENV

    - name: Decode secrets
      run: |
        echo "ENV_REPO_TOKEN=$(echo '${{ needs.load_secrets.outputs.env_repo_token }}' | base64 --decode)" >> $GITHUB_ENV
        echo "SCC_API_KEY=$(echo '${{ needs.load_secrets.outputs.scc_api_key }}' | base64 --decode)" >> $GITHUB_ENV
        echo "SCC_URL=$(echo '${{ needs.load_secrets.outputs.scc_url }}' | base64 --decode)" >> $GITHUB_ENV

    - name: Checkout devops repo
      uses: actions/checkout@v4
      with:
        repository: mdvworks/devops
        token: ${{ env.ENV_REPO_TOKEN }}
        path: devops-repo
    
    - name: Generate k8s manifests dari template
      run: |
        sed \
          -e 's|{{APP_NAME}}|${{ inputs.app_name }}|g' \
          -e 's|{{DOCKER_IMAGE}}|${{ needs.load_secrets.outputs.docker_username }}/${{ inputs.image_name }}:latest|g' \
          -e 's|{{REPLICAS}}|${{ inputs.replicas }}|g' \
          -e 's|{{CONTAINER_PORT}}|${{ inputs.container_port }}|g' \
          -e 's|{{HOST}}|${{ inputs.host }}|g' \
          -e "s|{{SCC_API_KEY}}|${SCC_API_KEY}|g" \
          -e "s|{{SCC_URL}}|${SCC_URL}|g" \
          devops-repo/k8s/templates/laravel-app.yml > rendered-k8s.yml

    - name: Debug rendered manifest
      run: |
        SCC_API_KEY_DECODED=$(echo '${{ needs.load_secrets.outputs.scc_api_key }}' | base64 --decode)
        SCC_URL_DECODED=$(echo '${{ needs.load_secrets.outputs.scc_url }}' | base64 --decode)
        
        echo "SCC_API_KEY_DECODED length: ${#SCC_API_KEY_DECODED}"
        echo "SCC_URL_DECODED length: ${#SCC_URL_DECODED}"
        
        echo "SCC_API_KEY=${SCC_API_KEY_DECODED}" >> $GITHUB_ENV
        echo "SCC_URL=${SCC_URL_DECODED}" >> $GITHUB_ENV

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f rendered-k8s.yml
        kubectl set image deployment/${{ inputs.app_name }} \
          ${{ inputs.app_name }}=${{ needs.load_secrets.outputs.docker_username }}/${{ inputs.image_name }}:latest
        kubectl rollout restart deployment/${{ inputs.app_name }}
        kubectl rollout status deployment/${{ inputs.app_name }} --timeout=120s

  # ─────────────────────────────────────────
  # JOB 5 — SUMMARY
  # ─────────────────────────────────────────
  summary:
    name: Job Summary
    runs-on: ubuntu-latest
    needs: [load_secrets, build, scan, deploy]
    if: always()

    steps:
    - name: Write summary
      run: |
        STATUS="${{ needs.deploy.result }}"

        if [ "$STATUS" = "success" ]; then
          ICON="✅"
          MSG="Deploy berhasil"
        else
          ICON="❌"
          MSG="Deploy gagal"
        fi

        cat >> $GITHUB_STEP_SUMMARY << EOF
        # ${ICON} ${MSG}

        | Info | Detail |
        |------|--------|
        | App | \`${{ inputs.app_name }}\` |
        | Host | \`${{ inputs.host }}\` |
        | Replicas | \`${{ inputs.replicas }}\` |
        | Commit | \`${{ github.sha }}\` |
        | Triggered by | \`${{ github.actor }}\` |

        ### Pipeline Result
        | Job | Status |
        |-----|--------|
        | Load Secrets | ${{ needs.load_secrets.result }} |
        | Build | ${{ needs.build.result }} |
        | Security Scan | ${{ needs.scan.result }} |
        | Deploy | ${{ needs.deploy.result }} |
        EOF