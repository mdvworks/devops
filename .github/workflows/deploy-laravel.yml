name: Reusable Deploy Laravel

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Nama app'
        required: true
        type: string
      image_name:
        description: 'Nama image Docker tanpa username'
        required: true
        type: string
      host:
        description: 'Domain host untuk ingress'
        required: true
        type: string
      env_file:
        description: 'Nama file .env di env-config repo'
        required: true
        type: string
      php_version:
        description: 'Versi PHP'
        required: false
        type: string
        default: '8.3'
      node_version:
        description: 'Versi Node.js'
        required: false
        type: string
        default: ''
      use_pnpm:
        description: 'Pakai pnpm?'
        required: false
        type: boolean
        default: true
      replicas:
        description: 'Jumlah replicas kubernetes'
        required: false
        type: number
        default: 1
      container_port:
        description: 'Port container'
        required: false
        type: number
        default: 80
    secrets:
      ENV_REPO_TOKEN:
        required: true
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true
      TS_AUTHKEY:
        required: true
      KUBE_CONFIG:
        required: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — BUILD
  # ─────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Checkout env config repo
      uses: actions/checkout@v4
      with:
        repository: michaedv/scc
        token: ${{ secrets.ENV_REPO_TOKEN }}
        path: env-configs

    - name: Copy .env
      run: cp env-configs/${{ inputs.env_file }} .env

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php_version }}
        extensions: mbstring, xml, ctype, iconv, json, dom, curl

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Setup Node.js
      if: inputs.node_version != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Install pnpm & build frontend
      if: inputs.node_version != '' && inputs.use_pnpm == true
      run: |
        npm install -g pnpm@8
        pnpm install
        pnpm run build

    - name: Install npm & build frontend
      if: inputs.node_version != '' && inputs.use_pnpm == false
      run: |
        npm ci
        npm run build

    - name: Checkout devops repo
      uses: actions/checkout@v4
      with:
        repository: michaedv/devops
        token: ${{ secrets.ENV_REPO_TOKEN }}
        path: devops-repo

    - name: Copy docker config dari devops repo
      run: |
        mkdir -p docker
        cp devops-repo/docker/laravel/nginx.conf docker/nginx.conf
        cp devops-repo/docker/laravel/supervisord.conf docker/supervisord.conf

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 2 — SECURITY SCAN
  # ─────────────────────────────────────────
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]

    steps:
    - name: Checkout project code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ inputs.php_version }}
        extensions: mbstring, xml, ctype, iconv, json, dom, curl

    - name: Install Composer Dependencies
      run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    - name: Setup Node.js
      if: inputs.node_version != ''
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Install pnpm
      if: inputs.node_version != '' && inputs.use_pnpm == true
      run: |
        npm install -g pnpm@8
        pnpm install

    - name: Install npm
      if: inputs.node_version != '' && inputs.use_pnpm == false
      run: npm ci

    - name: Composer audit
      run: composer audit --no-dev || true

    - name: pnpm audit
      if: inputs.node_version != '' && inputs.use_pnpm == true
      run: pnpm audit --audit-level=critical --prod || true

    - name: npm audit
      if: inputs.node_version != '' && inputs.use_pnpm == false
      run: npm audit --audit-level=critical --omit=dev || true

    - name: Trivy scan Docker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest
        format: table
        exit-code: '1'
        severity: CRITICAL
        ignore-unfixed: true
        vuln-type: library

  # ─────────────────────────────────────────
  # JOB 3 — DEPLOY
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [scan]

    steps:
    - name: Setup Tailscale
      uses: tailscale/github-action@v2
      with:
        authkey: ${{ secrets.TS_AUTHKEY }}

    - name: Set up Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Verify kubectl connection
      run: kubectl get nodes

    - name: Checkout devops repo
      uses: actions/checkout@v4
      with:
        repository: michaedv/devops
        token: ${{ secrets.ENV_REPO_TOKEN }}
        path: devops-repo

    - name: Generate k8s manifests dari template
      run: |
        sed \
          -e 's|{{APP_NAME}}|${{ inputs.app_name }}|g' \
          -e 's|{{DOCKER_IMAGE}}|${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest|g' \
          -e 's|{{REPLICAS}}|${{ inputs.replicas }}|g' \
          -e 's|{{CONTAINER_PORT}}|${{ inputs.container_port }}|g' \
          -e 's|{{HOST}}|${{ inputs.host }}|g' \
          devops-repo/k8s/templates/laravel-app.yml > rendered-k8s.yml

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f rendered-k8s.yml
        kubectl set image deployment/${{ inputs.app_name }} \
          ${{ inputs.app_name }}=${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest
        kubectl rollout restart deployment/${{ inputs.app_name }}
        kubectl rollout status deployment/${{ inputs.app_name }} --timeout=120s

  # ─────────────────────────────────────────
  # JOB 4 — SUMMARY
  # ─────────────────────────────────────────
  summary:
    name: Job Summary
    runs-on: ubuntu-latest
    needs: [build, scan, deploy]
    if: always()

    steps:
    - name: Write summary
      run: |
        STATUS="${{ needs.deploy.result }}"

        if [ "$STATUS" = "success" ]; then
          ICON="✅"
          MSG="Deploy berhasil"
        else
          ICON="❌"
          MSG="Deploy gagal"
        fi

        cat >> $GITHUB_STEP_SUMMARY << EOF
        # ${ICON} ${MSG}

        | Info | Detail |
        |------|--------|
        | App | \`${{ inputs.app_name }}\` |
        | Image | \`${{ secrets.DOCKER_USERNAME }}/${{ inputs.image_name }}:latest\` |
        | Host | \`${{ inputs.host }}\` |
        | Replicas | \`${{ inputs.replicas }}\` |
        | Commit | \`${{ github.sha }}\` |
        | Triggered by | \`${{ github.actor }}\` |

        ### Pipeline Result
        | Job | Status |
        |-----|--------|
        | Build | ${{ needs.build.result }} |
        | Security Scan | ${{ needs.scan.result }} |
        | Deploy | ${{ needs.deploy.result }} |
        EOF